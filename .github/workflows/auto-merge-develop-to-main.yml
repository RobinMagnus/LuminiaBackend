name: Automated develop to main

on:
  push:
    branches:
      - develop

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: develop-to-main
  cancel-in-progress: false

jobs:
  create-pr-and-enable-auto-merge:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.AUTO_MERGE_TOKEN || github.token }}
      GH_REPO: RobinMagnus/LuminiaBackend

    steps:
      - name: Check whether develop is ahead of main
        id: compare
        run: |
          ahead_count=$(gh api "repos/$GH_REPO/compare/main...develop" --jq '.ahead_by')
          echo "ahead_count=$ahead_count" >> "$GITHUB_OUTPUT"

      - name: Create or reuse pull request
        if: steps.compare.outputs.ahead_count != '0'
        id: pull-request
        run: |
          pr_number=$(gh pr list \
            --repo "$GH_REPO" \
            --head develop \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "$pr_number" ]; then
            pr_url=$(gh pr create \
              --repo "$GH_REPO" \
              --head develop \
              --base main \
              --title "Automated: merge develop into main" \
              --body "Automated PR created by the develop-to-main workflow.")
            pr_number=${pr_url##*/}
          fi

          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: steps.pull-request.outputs.pr_number != ''
        run: |
          gh pr merge "${{ steps.pull-request.outputs.pr_number }}" \
            --repo "$GH_REPO" \
            --auto \
            --merge
