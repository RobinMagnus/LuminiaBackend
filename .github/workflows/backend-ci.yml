name: Backend CI

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: backend-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate JavaScript syntax
        run: find src -name '*.js' -print0 | xargs -0 -n1 node --check

  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run automated tests
        env:
          JWT_SECRET: github_actions_test_secret
          JWT_EXPIRES_IN: 1d
          NODE_ENV: test
        run: npm test

  api:
    name: api
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        env:
          MONGO_INITDB_ROOT_USERNAME: luminia
          MONGO_INITDB_ROOT_PASSWORD: luminia123
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PORT: 3000
      MONGO_URI: mongodb://luminia:luminia123@localhost:27017/luminia_db?authSource=admin
      JWT_SECRET: github_actions_test_secret
      JWT_EXPIRES_IN: 1d
      NODE_ENV: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Seed database
        run: npm run seed

      - name: Start API
        run: npm start &

      - name: Check API health
        run: |
          for attempt in {1..20}; do
            if curl --fail http://localhost:3000; then
              exit 0
            fi
            sleep 2
          done
          exit 1

  merge-feature-into-develop:
    name: merge feature into develop
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.base.ref == 'develop' &&
      startsWith(github.event.pull_request.head.ref, 'feature/') &&
      github.event.pull_request.draft == false
    needs:
      - build
      - test
      - api
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: RobinMagnus/LuminiaBackend

    steps:
      - name: Enable feature auto-merge
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "$GH_REPO" \
            --auto \
            --merge

  merge-develop-into-main:
    name: merge develop into main
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs:
      - build
      - test
      - api
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: RobinMagnus/LuminiaBackend

    steps:
      - name: Check whether develop is ahead of main
        id: compare
        run: |
          ahead_count=$(gh api "repos/$GH_REPO/compare/main...develop" --jq '.ahead_by')
          echo "ahead_count=$ahead_count" >> "$GITHUB_OUTPUT"

      - name: Create or reuse pull request
        if: steps.compare.outputs.ahead_count != '0'
        id: pull-request
        run: |
          pr_number=$(gh pr list \
            --repo "$GH_REPO" \
            --head develop \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "$pr_number" ]; then
            pr_url=$(gh pr create \
              --repo "$GH_REPO" \
              --head develop \
              --base main \
              --title "Automated: merge develop into main" \
              --body "Automated PR created after the backend checks passed.")
            pr_number=${pr_url##*/}
          fi

          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Enable develop auto-merge
        if: steps.pull-request.outputs.pr_number != ''
        run: |
          gh pr merge "${{ steps.pull-request.outputs.pr_number }}" \
            --repo "$GH_REPO" \
            --auto \
            --merge
