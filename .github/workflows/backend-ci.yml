name: Backend CI

on:
  push:
    branches:
      - develop
      - 'feature/**'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate JavaScript syntax
        run: find src -name '*.js' -print0 | xargs -0 -n1 node --check

  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run automated tests
        env:
          JWT_SECRET: github_actions_test_secret
          JWT_EXPIRES_IN: 1d
          NODE_ENV: test
        run: npm test

  api:
    name: api
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      mongodb:
        image: mongo:6
        env:
          MONGO_INITDB_ROOT_USERNAME: luminia
          MONGO_INITDB_ROOT_PASSWORD: luminia123
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PORT: 3000
      MONGO_URI: mongodb://luminia:luminia123@localhost:27017/luminia_db?authSource=admin
      JWT_SECRET: github_actions_test_secret
      JWT_EXPIRES_IN: 1d
      NODE_ENV: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for MongoDB
        run: |
          mongo_container=$(docker ps \
            --filter "ancestor=mongo:6" \
            --format '{{.ID}}' | head -n 1)

          if [ -z "$mongo_container" ]; then
            echo "MongoDB container was not found!"
            exit 1
          fi

          for attempt in {1..30}; do
            if docker exec "$mongo_container" mongosh \
              --host localhost \
              --username luminia \
              --password luminia123 \
              --authenticationDatabase admin \
              --quiet \
              --eval 'db.adminCommand("ping")' > /dev/null; then
              echo "MongoDB is ready!"
              exit 0
            fi
            echo "Attempt $attempt: Waiting for MongoDB..."
            sleep 2
          done
          echo "MongoDB failed to start!"
          exit 1

      - name: Seed database
        run: npm run seed

      - name: Start API
        run: |
          npm start > api.log 2>&1 &
          API_PID=$!
          echo "API_PID=$API_PID" >> "$GITHUB_ENV"
          sleep 3

      - name: Check API health
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:3000 > /dev/null; then
              echo "API is healthy!"
              exit 0
            fi
            echo "Attempt $attempt: Waiting for API..."
            sleep 2
          done
          echo "API failed to start. Logs:"
          cat api.log
          exit 1

  merge-feature-into-develop:
    name: Auto PR feature to develop
    if: startsWith(github.ref, 'refs/heads/feature/')
    needs:
      - build
      - test
      - api
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: RobinMagnus/LuminiaBackend

    steps:
      - name: Create or reuse feature pull request
        id: pull-request
        run: |
          head_branch="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          pr_number=$(gh pr list \
            --repo "$GH_REPO" \
            --head "$head_branch" \
            --base develop \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "$pr_number" ]; then
            pr_url=$(gh pr create \
              --repo "$GH_REPO" \
              --head "$head_branch" \
              --base develop \
              --title "Auto PR: $head_branch → develop" \
              --body "PR created automatically after the backend checks passed.")
            pr_number=${pr_url##*/}
          fi

          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Enable feature auto-merge
        run: |
          gh pr merge "${{ steps.pull-request.outputs.pr_number }}" \
            --repo "$GH_REPO" \
            --auto \
            --merge || echo "Failed to enable auto-merge, but PR exists"

  merge-develop-into-main:
    name: Auto PR develop to main
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs:
      - build
      - test
      - api
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: RobinMagnus/LuminiaBackend

    steps:
      - name: Check whether develop is ahead of main
        id: compare
        run: |
          ahead_count=$(gh api "repos/$GH_REPO/compare/main...develop" --jq '.ahead_by')
          echo "ahead_count=$ahead_count" >> "$GITHUB_OUTPUT"

      - name: Create or reuse pull request
        if: steps.compare.outputs.ahead_count != '0'
        id: pull-request
        run: |
          pr_number=$(gh pr list \
            --repo "$GH_REPO" \
            --head develop \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "$pr_number" ]; then
            pr_url=$(gh pr create \
              --repo "$GH_REPO" \
              --head develop \
              --base main \
              --title "Release PR: develop → main" \
              --body "Este PR foi aberto automaticamente a partir de \`develop\`. Revise e aprove para prosseguir com o merge.")
            pr_number=${pr_url##*/}
          fi

          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Request release review
        if: steps.pull-request.outputs.pr_number != ''
        run: |
          gh api \
            --method POST \
            "repos/$GH_REPO/pulls/${{ steps.pull-request.outputs.pr_number }}/requested_reviewers" \
            --field 'reviewers[]=RobinMagnus'

      - name: Enable develop auto-merge
        if: steps.pull-request.outputs.pr_number != ''
        run: |
          gh pr merge "${{ steps.pull-request.outputs.pr_number }}" \
            --repo "$GH_REPO" \
            --auto \
            --merge || echo "Failed to enable auto-merge, but PR exists"
