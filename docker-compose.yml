services:
  mongo:
    image: mongo:7
    container_name: luminia-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-luminia}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-luminia123}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-luminia_db}
    volumes:
      - luminia_mongo_data:/data/db

volumes:
  luminia_mongo_data:
